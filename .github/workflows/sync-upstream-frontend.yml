name: Sync Upstream Frontend

on:
  workflow_dispatch:
  schedule:
    - cron: '23 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Install tooling
        run: pacman -Sy --noconfirm curl git

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Bump pinned frontend metadata
        run: ./scripts/bump-codex-frontend.sh --latest

      - name: Commit and push when upstream changed
        run: |
          if git diff --quiet --exit-code; then
            echo "No upstream frontend change detected."
            exit 0
          fi

          version="$(sed -n 's/^_codex_frontend_version=//p' packaging/aur/PKGBUILD)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/aur/PKGBUILD packaging/aur/.SRCINFO
          git commit -m "Bump frontend bundle to ${version}"
          git push
